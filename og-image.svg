<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080E"/>
      <stop offset="100%" style="stop-color:#0E1525"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8A020"/>
      <stop offset="60%" style="stop-color:#F5C44A"/>
      <stop offset="100%" style="stop-color:#E8A020;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#1E2640" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold-line)"/>
  <!-- Glow -->
  <ellipse cx="600" cy="0" rx="500" ry="200" fill="#E8A020" opacity="0.05"/>
  <!-- Logo mark -->
  <rect x="60" y="60" width="52" height="52" rx="8" fill="#E8A020"/>
  <text x="86" y="96" font-family="Georgia, serif" font-weight="900" font-size="32" fill="#000" text-anchor="middle">$</text>
  <!-- Logo text -->
  <text x="126" y="100" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" letter-spacing="3" fill="#E2E8F4">PRIZE</text>
  <text x="233" y="100" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" letter-spacing="3" fill="#E8A020">WIRE</text>
  <!-- Main headline -->
  <text x="60" y="240" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" letter-spacing="-2" fill="#E2E8F4">Sports Money.</text>
  <text x="60" y="340" font-family="Arial Black, sans-serif" font-weight="900" font-size="88" letter-spacing="-2" fill="#E8A020">Fully Covered.</text>
  <!-- Sub line -->
  <text x="60" y="410" font-family="Arial, sans-serif" font-size="26" fill="#8895AA">Prize pools · Player salaries · Tournament payouts</text>
  <!-- Stats bar -->
  <rect x="60" y="470" width="1080" height="1" fill="#1E2640"/>
  <text x="60" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#E8A020">€2.47B</text>
  <text x="60" y="545" font-family="Arial, sans-serif" font-size="14" fill="#8895AA">Champions League</text>
  <text x="260" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#E8A020">€200M/yr</text>
  <text x="260" y="545" font-family="Arial, sans-serif" font-size="14" fill="#8895AA">Ronaldo Salary</text>
  <text x="500" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#E8A020">$871M</text>
  <text x="500" y="545" font-family="Arial, sans-serif" font-size="14" fill="#8895AA">World Cup 2026</text>
  <text x="700" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#E8A020">$3.69M</text>
  <text x="700" y="545" font-family="Arial, sans-serif" font-size="14" fill="#8895AA">PGA Champ Winner</text>
  <text x="940" y="520" font-family="Arial Black, sans-serif" font-weight="900" font-size="36" fill="#E8A020">$1.1B</text>
  <text x="940" y="545" font-family="Arial, sans-serif" font-size="14" fill="#8895AA">F1 Prize Fund</text>
  <!-- URL -->
  <text x="60" y="600" font-family="Arial, sans-serif" font-size="18" fill="#3E4D6B">prizewire.vercel.app</text>
</svg>