<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="google030d394dae3fee69">
  <title>Search Results | PrizeWire</title>
  <meta name="description" content="Search sports prize money, player earnings, and payout data across NFL, NBA, PGA, F1, Tennis, and UFC.">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://prizewire.vercel.app/search">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQQT6BFW2C"></script>
  <script>
    window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
    gtag('js',new Date());gtag('config','G-GQQT6BFW2C');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    .search-hero {
      padding-block: 48px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .search-hero-inner {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .search-hero-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-faint);
      text-transform: uppercase;
    }
    .search-bar-large {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: border-color .2s;
      max-width: 720px;
    }
    .search-bar-large:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .search-bar-large__icon {
      padding: 0 18px;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .search-bar-large__input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 18px;
      color: var(--text);
      padding: 18px 0;
    }
    .search-bar-large__input::placeholder { color: var(--text-faint); }
    .search-bar-large__btn {
      background: var(--gold);
      color: #000;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.08em;
      padding: 0 24px;
      height: 58px;
      border: none;
      cursor: pointer;
      transition: background .15s;
      flex-shrink: 0;
    }
    .search-bar-large__btn:hover { background: var(--gold-bright); }

    .search-status {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .search-status strong { color: var(--gold); font-style: normal; }

    /* Results */
    .results-section { padding-block: 40px; }
    .results-section + .results-section { padding-top: 0; }

    .results-type-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .results-type-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Athlete profile card */
    .athlete-profile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .athlete-profile__header {
      padding: 28px 28px 24px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    .athlete-profile__name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 40px;
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .athlete-profile__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .athlete-profile__nationality {
      font-size: 13px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .athlete-profile__team {
      font-size: 13px;
      color: var(--text-dim);
    }
    .athlete-profile__note {
      font-size: 12px;
      color: var(--text-faint);
      font-style: italic;
      margin-top: 10px;
      max-width: 520px;
      line-height: 1.55;
    }
    .athlete-profile__total {
      text-align: right;
      flex-shrink: 0;
    }
    .athlete-profile__total-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .athlete-profile__total-val {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 36px;
      color: var(--gold);
      line-height: 1;
    }
    .athlete-profile__total-sub {
      font-size: 11px;
      color: var(--text-faint);
      font-family: var(--font-mono);
      margin-top: 4px;
    }

    /* Payout history table */
    .payout-history {
      width: 100%;
      border-collapse: collapse;
    }
    .payout-history th {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      text-transform: uppercase;
      padding: 11px 20px;
      text-align: left;
      background: var(--surface-3);
      border-bottom: 1px solid var(--border);
    }
    .payout-history th:last-child { text-align: right; }
    .payout-history tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .payout-history tbody tr:last-child { border-bottom: none; }
    .payout-history tbody tr:hover { background: var(--surface-2); }
    .payout-history td { padding: 13px 20px; font-size: 13px; }
    .payout-history td:first-child {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-faint);
      width: 60px;
    }
    .payout-history__event { font-weight: 500; }
    .payout-history__event a { transition: color .15s; }
    .payout-history__event a:hover { color: var(--gold); }
    .payout-history__result { color: var(--text-dim); font-size: 12px; }
    .payout-history__type {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
    }
    .payout-history__amount {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--gold);
      text-align: right;
    }

    /* Event result card */
    .event-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 10px;
      transition: border-color .2s, transform .15s;
      text-decoration: none;
      color: inherit;
    }
    .event-result:hover {
      border-color: var(--border-light);
      transform: translateX(4px);
    }
    .event-result__left { display: flex; align-items: center; gap: 14px; }
    .event-result__info {}
    .event-result__name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 3px;
      transition: color .15s;
    }
    .event-result:hover .event-result__name { color: var(--gold); }
    .event-result__sub { font-size: 12px; color: var(--text-dim); }
    .event-result__purse {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 24px;
      color: var(--gold);
      text-align: right;
      flex-shrink: 0;
    }
    .event-result__purse-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-faint);
      text-align: right;
      margin-bottom: 2px;
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-dim);
    }
    .no-results__icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .no-results h2 {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 32px;
      margin-bottom: 10px;
      color: var(--text);
    }
    .no-results p { font-size: 14px; line-height: 1.7; max-width: 420px; margin-inline: auto; }

    /* Empty state (before search) */
    .search-suggestions {
      padding-block: 48px;
    }
    .suggestions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .suggestion-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px 18px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .suggestion-pill:hover {
      border-color: var(--gold);
      background: var(--gold-glow);
    }
    .suggestion-pill__name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
    }
    .suggestion-pill__sport {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 1px;
    }

    @media (max-width: 768px) {
      .athlete-profile__header { flex-direction: column; }
      .athlete-profile__total { text-align: left; }
      .suggestions-grid { grid-template-columns: 1fr 1fr; }
      .search-bar-large__input { font-size: 15px; }
      .payout-history th:nth-child(4),
      .payout-history td:nth-child(4) { display: none; }
    }
    @media (max-width: 480px) {
      .suggestions-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- TICKER -->
  <div class="ticker-bar" role="marquee" aria-label="Latest payout data">
    <div class="ticker-label">PRIZE WIRE</div>
    <div class="ticker-scroll-wrap">
      <div class="ticker-track" id="ticker-track">
        <span class="ticker-item"><span class="ticker-item__event">Loading...</span></span>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="site-header" role="banner">
    <div class="container">
      <div class="header-inner">
        <a href="/" class="site-logo" aria-label="PrizeWire home">
          <div class="logo-mark" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none"><path d="M8 1.5L2.5 14h3.2l.9-2.4h2.8l.9 2.4H13.5L8 1.5zm0 4.5l1.1 3.5H6.9L8 6z" fill="#000"/></svg>
          </div>
          <span class="logo-text">PRIZE<span>WIRE</span></span>
        </a>
        <nav class="sport-nav" aria-label="Sport categories">
          <a href="/"        class="sport-nav-item">ALL</a>
          <a href="/nfl/"    class="sport-nav-item">NFL</a>
          <a href="/nba/"    class="sport-nav-item">NBA</a>
          <a href="/pga/"    class="sport-nav-item">PGA TOUR</a>
          <a href="/f1/"     class="sport-nav-item">F1</a>
          <a href="/tennis/" class="sport-nav-item">TENNIS</a>
          <a href="/ufc/"    class="sport-nav-item">UFC</a>
        </nav>
        <div class="header-actions">
          <span id="last-updated"></span>
        </div>
      </div>
    </div>
  </header>

  <main id="main-content">

    <!-- SEARCH HERO -->
    <div class="search-hero">
      <div class="container">
        <div class="search-hero-inner">
          <div class="search-hero-label">ATHLETE &amp; EVENT SEARCH</div>
          <div class="search-bar-large" role="search">
            <div class="search-bar-large__icon" aria-hidden="true">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M13 13l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </div>
            <input
              type="search"
              id="search-input-main"
              class="search-bar-large__input"
              placeholder="Search athlete, event, sport... e.g. Max Verstappen"
              aria-label="Search athletes and events"
              autocomplete="off"
              spellcheck="false"
            >
            <button class="search-bar-large__btn" id="search-btn" aria-label="Search">SEARCH</button>
          </div>
          <div class="search-status" id="search-status" aria-live="polite"></div>
        </div>
      </div>
    </div>

    <!-- RESULTS AREA -->
    <div class="container">
      <div id="results-area">

        <!-- Default state: suggestions -->
        <div class="search-suggestions" id="suggestions-area">
          <div class="results-type-label">POPULAR SEARCHES</div>
          <div class="suggestions-grid" id="suggestions-grid">
            <!-- Populated by JS -->
          </div>
        </div>

      </div>
    </div>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px">
        <div style="font-family:var(--font-display);font-weight:900;font-size:18px">
          PRIZE<span style="color:var(--gold)">WIRE</span>
        </div>
        <nav style="display:flex;gap:20px;flex-wrap:wrap">
          <a href="/"           style="font-size:13px;color:var(--text-dim);transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">Home</a>
          <a href="/articles/"  style="font-size:13px;color:var(--text-dim);transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">All Breakdowns</a>
          <a href="/about/"     style="font-size:13px;color:var(--text-dim);transition:color .15s" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-dim)'">About</a>
        </nav>
      </div>
      <div class="footer-bottom">
        <div class="footer-copy">© 2026 PrizeWire. All rights reserved.</div>
        <div class="footer-disclaimer">Prize money figures sourced from official announcements. Not affiliated with any sports league or governing body.</div>
      </div>
    </div>
  </footer>

  <script src="/js/app.js" defer></script>
  <script>
  (async function() {

    const $ = id => document.getElementById(id);
    const SPORT_COLORS = {
      NFL:'#003F8A', NBA:'#C9082A', PGA:'#006837', F1:'#E8002D',
      Tennis:'#4A7C59', UFC:'#D4002A', Boxing:'#7B2FBE', MLB:'#002D72', NHL:'#000099'
    };

    // Load data
    let athletes = [], events = [];
    try {
      const [aRes, pRes] = await Promise.all([
        fetch('/data/athletes.json'),
        fetch('/data/payouts.json')
      ]);
      const aData = await aRes.json();
      const pData = await pRes.json();
      athletes = aData.athletes || [];
      events   = pData.featured || [];
    } catch(e) {
      console.warn('Search: failed to load data', e);
    }

    // Populate suggestions
    function renderSuggestions() {
      const grid = $('suggestions-grid');
      if (!grid) return;
      const sample = athletes.slice(0, 9);
      grid.innerHTML = sample.map(a => `
        <a class="suggestion-pill" href="/search?q=${encodeURIComponent(a.name)}">
          <span class="sport-badge" style="background:${a.sportColor || SPORT_COLORS[a.sport]}">${a.sport}</span>
          <div>
            <div class="suggestion-pill__name">${a.name}</div>
            <div class="suggestion-pill__sport">${a.team || a.nationality || ''}</div>
          </div>
        </a>
      `).join('');
    }

    // Search logic
    function search(query) {
      const q = query.trim().toLowerCase();
      if (!q) return { athletes: [], events: [] };

      const matchedAthletes = athletes.filter(a =>
        a.name.toLowerCase().includes(q) ||
        (a.team || '').toLowerCase().includes(q) ||
        a.sport.toLowerCase().includes(q)
      );

      const matchedEvents = events.filter(e =>
        e.event.toLowerCase().includes(q) ||
        e.sport.toLowerCase().includes(q) ||
        e.venue.toLowerCase().includes(q)
      );

      return { athletes: matchedAthletes, events: matchedEvents };
    }

    // Render results
    function renderResults(query, results) {
      const area      = $('results-area');
      const sugArea   = $('suggestions-area');
      const statusEl  = $('search-status');
      const total     = results.athletes.length + results.events.length;

      if (sugArea) sugArea.style.display = 'none';

      if (statusEl) {
        statusEl.innerHTML = total > 0
          ? `<strong>${total}</strong> result${total !== 1 ? 's' : ''} for "<strong>${query}</strong>"`
          : `No results for "<strong>${query}</strong>"`;
      }

      if (total === 0) {
        area.innerHTML = `
          <div class="no-results">
            <div class="no-results__icon">🔍</div>
            <h2>No results found</h2>
            <p>Try searching for an athlete name like <strong style="color:var(--gold)">Max Verstappen</strong>, a sport like <strong style="color:var(--gold)">PGA</strong>, or an event like <strong style="color:var(--gold)">Super Bowl</strong>.</p>
          </div>`;
        return;
      }

      let html = '<div style="padding-block:40px;display:flex;flex-direction:column;gap:48px">';

      // Athletes
      if (results.athletes.length) {
        html += `<div>
          <div class="results-type-label">ATHLETES (${results.athletes.length})</div>`;
        results.athletes.forEach(a => {
          const color = a.sportColor || SPORT_COLORS[a.sport] || '#556080';
          html += `
          <div class="athlete-profile">
            <div class="athlete-profile__header">
              <div>
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
                  <span class="sport-badge" style="background:${color}">${a.sport}</span>
                  <span class="athlete-profile__nationality">${a.nationality || ''}</span>
                </div>
                <div class="athlete-profile__name">${a.name}</div>
                <div class="athlete-profile__team">${a.team || ''}</div>
                ${a.note ? `<div class="athlete-profile__note">ⓘ ${a.note}</div>` : ''}
              </div>
              <div class="athlete-profile__total">
                <div class="athlete-profile__total-label">ENTRIES IN DATABASE</div>
                <div class="athlete-profile__total-val">${a.payouts.length}</div>
                <div class="athlete-profile__total-sub">recorded payouts</div>
              </div>
            </div>
            <table class="payout-history">
              <thead>
                <tr>
                  <th>Year</th>
                  <th>Event</th>
                  <th>Result</th>
                  <th>Type</th>
                  <th>Payout</th>
                </tr>
              </thead>
              <tbody>
                ${a.payouts.map(p => `
                  <tr>
                    <td>${p.year}</td>
                    <td class="payout-history__event">
                      ${p.slug
                        ? `<a href="/articles/${p.slug}">${p.event}</a>`
                        : p.event}
                    </td>
                    <td class="payout-history__result">${p.result}</td>
                    <td class="payout-history__type">${p.type}</td>
                    <td class="payout-history__amount">${p.payout}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>`;
        });
        html += '</div>';
      }

      // Events
      if (results.events.length) {
        html += `<div>
          <div class="results-type-label">EVENTS (${results.events.length})</div>`;
        results.events.forEach(e => {
          const color = e.sportColor || SPORT_COLORS[e.sport] || '#556080';
          html += `
          <a href="/articles/${e.slug}" class="event-result">
            <div class="event-result__left">
              <span class="sport-badge" style="background:${color}">${e.sport}</span>
              <div class="event-result__info">
                <div class="event-result__name">${e.event}</div>
                <div class="event-result__sub">${e.venue} &middot; ${e.date}</div>
              </div>
            </div>
            <div>
              <div class="event-result__purse-label">TOTAL PURSE</div>
              <div class="event-result__purse">${e.totalPurse}</div>
            </div>
          </a>`;
        });
        html += '</div>';
      }

      html += '</div>';
      area.innerHTML = html;
    }

    // Run search from URL param
    function runFromURL() {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q') || '';
      if (q) {
        const input = $('search-input-main');
        if (input) input.value = q;
        const results = search(q);
        renderResults(q, results);
      } else {
        renderSuggestions();
      }
    }

    // Update URL without reload
    function updateURL(q) {
      const url = q ? `/search?q=${encodeURIComponent(q)}` : '/search';
      window.history.pushState({}, '', url);
    }

    // Events
    const input = $('search-input-main');
    const btn   = $('search-btn');

    function doSearch() {
      const q = input?.value?.trim();
      if (!q) return;
      updateURL(q);
      renderResults(q, search(q));
    }

    btn?.addEventListener('click', doSearch);
    input?.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    // Live search as user types (debounced)
    let debounceTimer;
    input?.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const q = input.value.trim();
        if (q.length >= 2) {
          updateURL(q);
          renderResults(q, search(q));
        } else if (q.length === 0) {
          updateURL('');
          $('suggestions-area') && ($('suggestions-area').style.display = '');
          $('results-area').innerHTML = '';
          $('results-area').appendChild($('suggestions-area'));
          renderSuggestions();
          const statusEl = $('search-status');
          if (statusEl) statusEl.innerHTML = '';
        }
      }, 280);
    });

    // Init
    runFromURL();

  })();
  </script>
